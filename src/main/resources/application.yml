spring:
  application:
    name: minu-pay
  profiles:
    active: local
  jackson:
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:minupay-dev-secret-key-must-be-at-least-32-characters}
  expiration: 86400000  # 24h

toss:
  base-url: https://api.tosspayments.com/v1
  secret-key: ${TOSS_SECRET_KEY:test_sk_placeholder}

outbox:
  publisher:
    delay-ms: 1000
    max-retries: 5

audit:
  consumer:
    group-id: audit-consumer-group

settlement:
  consumer:
    group-id: settlement-consumer-group
  fee-rate: 0.03

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:minupay;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/minupay}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://localhost:3306/minupay?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=utf8mb4&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: minupay
    password: minupay
  data:
    mongodb:
      uri: mongodb://localhost:27017/minupay
  kafka:
    bootstrap-servers: localhost:9092
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    mongodb:
      uri: ${MONGODB_URI}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
